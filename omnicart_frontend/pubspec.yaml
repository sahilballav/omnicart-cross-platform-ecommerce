name: omnicart_frontend
description: "OmniCart - AI-Powered Cross-Platform E-commerce Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Routing & Navigation
  go_router: ^13.2.4

  # Networking
  dio: ^5.4.3
  retrofit: ^4.1.0

  # Local Storage & Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utility & Design
  uuid: ^4.3.3
  path_provider: ^2.1.3
  google_fonts: ^6.2.1
  flutter_spinkit: ^5.2.1
  intl: ^0.19.0
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  retrofit_generator: ^8.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
