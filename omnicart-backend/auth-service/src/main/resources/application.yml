server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Custom Application Config for JWT
app:
  jwt:
    secret: 9a4f2c8d3b7a1e5f8c3d6b9a2e4f7a1b3c5d8e2f6a9b3c1d4e7f8a9b0c1d2e3f
    expiration-ms: 86400000 # 24 Hours
